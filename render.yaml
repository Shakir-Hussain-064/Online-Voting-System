services:
  - type: static
    name: online-voting-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: VITE_API_URL
        value: https://online-voting-system-2-lx8t.onrender.com/login
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: online-voting-api
    rootDir: server
    runtime: node
    buildCommand: npm install
    startCommand: npm start
